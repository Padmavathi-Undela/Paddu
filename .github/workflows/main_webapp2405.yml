name: Deploy app to Azure Web App - webapp2405

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read

    steps:
      # ✅ Step 1: Checkout code from GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Step 2: Login to Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A1D12596DEFA49C9853BAC51DCB9D541 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_38425BFE39F842AB85710B56C390A6E4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9815E61F41EE4172BB3E8870677A04A7 }}

      # ✅ Step 3: Deploy files directly (NO BUILD)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: webapp2405
          slot-name: Production
          package: .
